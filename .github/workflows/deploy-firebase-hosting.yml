name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write

env:
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
  FIREBASE_CONFIG_READY: ${{ vars.VITE_FIREBASE_API_KEY != '' && vars.VITE_FIREBASE_AUTH_DOMAIN != '' && vars.VITE_FIREBASE_PROJECT_ID != '' && vars.VITE_FIREBASE_MESSAGING_SENDER_ID != '' && vars.VITE_FIREBASE_APP_ID != '' }}
  FIREBASE_SERVICE_ACCOUNT_READY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRAFFIC_LIGHT_DEBATE != '' }}

jobs:
  build_and_deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Firestore rules test
        run: npm run test:rules

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      - name: Install Playwright browsers
        timeout-minutes: 30
        run: npx playwright install --with-deps chromium

      - name: E2E test
        run: npm run test:e2e

      - name: Write Firebase service account
        if: env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_SERVICE_ACCOUNT_READY == 'true'
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRAFFIC_LIGHT_DEBATE }}
          JSON

      - name: Deploy preview channel
        if: github.event_name == 'pull_request' && env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_CONFIG_READY == 'true' && env.FIREBASE_SERVICE_ACCOUNT_READY == 'true'
        run: npx --yes firebase-tools hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" --project "$FIREBASE_PROJECT_ID" --expires 14d --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

      - name: Deploy live channel
        if: github.event_name != 'pull_request' && env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_CONFIG_READY == 'true' && env.FIREBASE_SERVICE_ACCOUNT_READY == 'true'
        run: npx --yes firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

      - name: Deploy Firestore rules
        if: github.event_name != 'pull_request' && env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_SERVICE_ACCOUNT_READY == 'true'
        run: npx --yes firebase-tools deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

      - name: Smoke check live teacher route
        if: github.event_name != 'pull_request' && env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_CONFIG_READY == 'true' && env.FIREBASE_SERVICE_ACCOUNT_READY == 'true'
        run: |
          set -euo pipefail
          smoke_url="https://${FIREBASE_PROJECT_ID}.web.app/teacher"
          max_attempts=6
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Smoke check attempt ${attempt}/${max_attempts}: ${smoke_url}"
            if status_code=$(
              curl \
                --silent \
                --location \
                --show-error \
                --max-time 20 \
                --output /tmp/teacher-route.html \
                --write-out '%{http_code}' \
                "$smoke_url"
            ); then
              if [ "$status_code" = "200" ]; then
                echo "Smoke check passed on attempt ${attempt}/${max_attempts}: HTTP ${status_code}"
                exit 0
              fi

              echo "Attempt ${attempt}/${max_attempts}: expected HTTP 200 for ${smoke_url}, got HTTP ${status_code}"
            else
              echo "Attempt ${attempt}/${max_attempts}: network request failed for ${smoke_url}"
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Retrying after 10 seconds..."
              sleep 10
            else
              echo "Smoke check failed after ${max_attempts} attempts for ${smoke_url}"
              exit 1
            fi
            attempt=$((attempt + 1))
          done

      - name: Skip deploy notice
        if: env.FIREBASE_PROJECT_ID == '' || env.FIREBASE_CONFIG_READY != 'true' || env.FIREBASE_SERVICE_ACCOUNT_READY != 'true'
        run: echo "Firebase Hosting deploy skipped. Set FIREBASE_PROJECT_ID, VITE_FIREBASE_* variables, and FIREBASE_SERVICE_ACCOUNT_TRAFFIC_LIGHT_DEBATE secret."
